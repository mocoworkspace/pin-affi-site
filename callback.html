<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>連携コード | pin-affi</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      background: #fafafa; color: #222; padding: 20px;
    }
    .card {
      background: #fff; border: 1px solid #e5e5e5; border-radius: 16px;
      padding: 28px; max-width: 480px; width: 100%; text-align: center;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #666; margin: 4px 0 16px; line-height: 1.7; }
    .code {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      background: #f3f3f3; border: 1px solid #ddd; border-radius: 10px;
      padding: 14px; word-break: break-all; font-size: 15px; user-select: all;
    }
    button {
      margin-top: 16px; background: #e60023; color: #fff; border: 0;
      border-radius: 10px; padding: 12px 20px; font-size: 15px; cursor: pointer;
    }
    .err { color: #e60023; }
    footer { color: #aaa; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📌 連携コードを取得しました</h1>
    <p>このコードを pin-affi アプリに貼り付けてください。</p>
    <div id="code" class="code">読み込み中…</div>
    <button id="copy" type="button">コードをコピー</button>
    <footer>© 2026 mocolab</footer>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    const err = params.get("error");
    const el = document.getElementById("code");
    if (code) {
      el.textContent = code;
    } else if (err) {
      el.textContent = "エラー: " + err;
      el.classList.add("err");
    } else {
      el.textContent = "コードが見つかりませんでした。";
      el.classList.add("err");
    }
    document.getElementById("copy").addEventListener("click", () => {
      if (code) navigator.clipboard.writeText(code).then(() => {
        document.getElementById("copy").textContent = "コピーしました ✓";
      });
    });
  </script>
</body>
</html>
